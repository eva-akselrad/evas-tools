<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Offline | JARVIS</title>
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.125);
        --text-main: #ffffff;
        --text-dim: rgba(255, 255, 255, 0.6);
        --danger: #ef4444;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #050505;
        color: var(--text-main);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .background-mesh {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: -1;
        background: 
          radial-gradient(circle at 20% 30%, #1e1b4b 0%, transparent 40%),
          radial-gradient(circle at 80% 70%, #450a0a 0%, transparent 40%),
          radial-gradient(circle at 50% 50%, #0f172a 0%, #050505 100%);
        filter: blur(80px);
      }

      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid var(--glass-border);
        border-radius: 32px;
        padding: 3rem;
        text-align: center;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }

      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        display: block;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        background: linear-gradient(to bottom, #fff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p {
        color: var(--text-dim);
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1.25rem;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 99px;
        color: var(--danger);
        font-weight: 600;
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .pulse-dot {
        width: 8px;
        height: 8px;
        background-color: var(--danger);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--danger);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.2); opacity: 0.5; }
        100% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="background-mesh"></div>
    <div class="glass-card">
      <span class="icon">🔌</span>
      <h1>System Offline</h1>
      <p>The target node is currently disconnected. This usually means the host computer is powered down or the secure tunnel has been suspended.</p>
      <div class="status-badge">
        <div class="pulse-dot"></div>
        Connection Lost
      </div>
    </div>
  </body>
</html>
